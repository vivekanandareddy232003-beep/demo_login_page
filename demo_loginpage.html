<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Day - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#FFB7C5,#FFB7C5);
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        .login-box h1{
            color:#5c3317;
            margin-bottom:10px;
        }

        .login-box p{
            color:#777;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#6f4e37;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4b2e2e;
        }

        .links{
            margin-top:15px;
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        .links a{
            text-decoration:none;
            color:#6f4e39;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .coffee{
            font-size:50px;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="coffee">☕</div>

    <h1>Coffee Day</h1>

    <p>Welcome Back!</p>

    <form>

        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="#">Sign Up</a>
    </div>

</div>

</body>
</html>
